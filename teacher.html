<!--
=====================================================================
  AFS PRACTICE TEST — TEACHER DASHBOARD
  Real-time monitoring of student results from Firebase Realtime DB.
  Pairs with afs_practice_test.html (same Firebase project).

  This page is READ-ONLY by design — it never writes to the database.
  Host it next to afs_practice_test.html (e.g. same GitHub Pages repo)
  and bookmark it; refresh is automatic, no need to reload manually.
=====================================================================
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AFS Practice Test — Teacher Dashboard</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBwt51rkg_E8NlrnG648lKFnusMl352WDI",
    authDomain: "afs-practice-test.firebaseapp.com",
    databaseURL: "https://afs-practice-test-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "afs-practice-test",
    storageBucket: "afs-practice-test.firebasestorage.app",
    messagingSenderId: "492960077109",
    appId: "1:492960077109:web:57a8e55c239fc88372687c"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const resultsRef = ref(db, "results");

  onValue(resultsRef, (snapshot) => {
    const data = snapshot.val() || {};
    const rows = Object.entries(data).map(([key, v]) => ({ _key: key, ...v }));
    window.__renderResults(rows);
  }, (err) => {
    window.__renderError(err);
  });
</script>

<style>
  :root{
    --navy:#1d3557; --ink:#1c1c1c; --muted:#6b6b6b; --line:#e3ddd0; --line-soft:#eee8db;
    --bg:#fbf9f4; --card:#fff; --correct:#2a7a3b; --wrong:#b3261e; --warn:#b58900;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1200px;margin:0 auto;padding:0 20px}
  header.bar{background:var(--navy);color:#fff;padding:16px 0;position:sticky;top:0;z-index:10}
  header.bar .wrap{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  header.bar h1{font-size:18px;margin:0;font-weight:700}
  header.bar small{display:block;font-size:12px;opacity:.75;font-weight:400;margin-top:2px}
  .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#3ddc84;margin-right:6px;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:20px 0;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-radius:10px}
  .toolbar select,.toolbar input{font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit}
  .toolbar label{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:4px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:0 0 20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
  .stat b{display:block;font-size:26px;line-height:1.1}
  .stat span{font-size:12px;color:var(--muted)}
  table.results{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  table.results th,table.results td{padding:10px 12px;border-bottom:1px solid var(--line-soft);font-size:13.5px;text-align:left;white-space:nowrap}
  table.results th{background:#f5f1e6;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);cursor:pointer;user-select:none}
  table.results th:hover{color:var(--ink)}
  table.results tbody tr:hover{background:#fbf7ec}
  .pct-cell{font-weight:700}
  .pct-high{color:var(--correct)} .pct-mid{color:var(--warn)} .pct-low{color:var(--wrong)}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .err{padding:16px;background:#fde8e8;border:1px solid #f3b9b9;border-radius:8px;color:var(--wrong);margin:20px 0}
  .btn{font-size:13px;padding:8px 14px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;font-family:inherit}
  .btn:hover{background:#f5f1e6}
  .btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
  .btn-primary:hover{background:#16294a}
  .detail-row td{background:#fbf9f4!important;white-space:normal}
  .partgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:6px}
  .partchip{background:#fff;border:1px solid var(--line);border-radius:6px;padding:6px 10px;font-size:12px}
  .toggle-row{cursor:pointer}
  .toggle-row td:first-child::before{content:"▸ ";color:var(--muted)}
  .toggle-row.open td:first-child::before{content:"▾ ";color:var(--navy)}
  footer{padding:30px 0;text-align:center;color:var(--muted);font-size:12px}
</style>

<header class="bar">
  <div class="wrap">
    <div>
      <h1><span class="live-dot"></span>AFS Practice Test — Teacher Dashboard</h1>
      <small>Live results, synced automatically the moment a student submits</small>
    </div>
    <button class="btn" id="refreshNote">Auto-updates · no refresh needed</button>
  </div>
</header>

<main class="wrap">
  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <label>Test set
      <select id="filterSet"><option value="">All sets</option></select>
    </label>
    <label>Class
      <select id="filterClass"><option value="">All classes</option></select>
    </label>
    <label>Search name
      <input id="filterName" placeholder="Type a name…">
    </label>
    <button class="btn" id="exportCsv" style="margin-left:auto;align-self:flex-end">Export all visible rows (.csv)</button>
  </div>

  <div id="tableHost"></div>
</main>

<footer>AFS Practice Test · Teacher dashboard is read-only — it cannot edit or delete student data.</footer>

<script>
let ALL_ROWS = [];
let sortKey = "submitted_at", sortDir = -1;
let openKeys = new Set();

function mmss(sec){ if(sec==null) return "-"; const m=String(Math.floor(sec/60)).padStart(2,"0"), s=String(sec%60).padStart(2,"0"); return `${m}:${s}`; }
function pctClass(p){ return p>=80?"pct-high":p>=60?"pct-mid":"pct-low"; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function populateFilters(rows){
  const setSel=document.getElementById("filterSet"), clsSel=document.getElementById("filterClass");
  const curSet=setSel.value, curCls=clsSel.value;
  const sets=[...new Set(rows.map(r=>r.set_title).filter(Boolean))].sort();
  const classes=[...new Set(rows.map(r=>r.class).filter(Boolean))].sort();
  setSel.innerHTML=`<option value="">All sets</option>`+sets.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("");
  clsSel.innerHTML=`<option value="">All classes</option>`+classes.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("");
  setSel.value = sets.includes(curSet) ? curSet : "";
  clsSel.value = classes.includes(curCls) ? curCls : "";
}

function getFiltered(){
  const setF=document.getElementById("filterSet").value;
  const clsF=document.getElementById("filterClass").value;
  const nameF=(document.getElementById("filterName").value||"").trim().toLowerCase();
  return ALL_ROWS.filter(r=>{
    if(setF && r.set_title!==setF) return false;
    if(clsF && r.class!==clsF) return false;
    if(nameF && !(r.name||"").toLowerCase().includes(nameF)) return false;
    return true;
  });
}

function renderStats(rows){
  const n=rows.length;
  const avgPct = n? Math.round(rows.reduce((a,r)=>a+(r.percent||0),0)/n) : 0;
  const highest = n? Math.max(...rows.map(r=>r.percent||0)) : 0;
  const lowest = n? Math.min(...rows.map(r=>r.percent||0)) : 0;
  const classes = new Set(rows.map(r=>r.class).filter(Boolean)).size;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><b>${n}</b><span>Submissions</span></div>
    <div class="stat"><b>${avgPct}%</b><span>Average score</span></div>
    <div class="stat"><b>${highest}%</b><span>Highest score</span></div>
    <div class="stat"><b>${lowest}%</b><span>Lowest score</span></div>
    <div class="stat"><b>${classes}</b><span>Classes represented</span></div>
  `;
}

function sortRows(rows){
  return [...rows].sort((a,b)=>{
    let av=a[sortKey], bv=b[sortKey];
    if(sortKey==="submitted_at"){ av=av||""; bv=bv||""; }
    if(typeof av==="string") av=av.toLowerCase();
    if(typeof bv==="string") bv=bv.toLowerCase();
    if(av<bv) return -1*sortDir;
    if(av>bv) return 1*sortDir;
    return 0;
  });
}

function partGridHtml(perPart){
  if(!perPart) return "<i>No section breakdown recorded</i>";
  return `<div class="partgrid">`+Object.entries(perPart).map(([k,v])=>`<div class="partchip"><b>${esc(k)}</b>: ${esc(v)}</div>`).join("")+`</div>`;
}

function answersHtml(answers){
  if(!answers || !answers.length) return "<i>No answers recorded</i>";
  return `<div style="font-family:monospace;font-size:12px;word-break:break-all;margin-top:6px">`+
    answers.map(a=>a==null?"_":a).join(" ")+`</div>`;
}

function renderTable(){
  const rows = sortRows(getFiltered());
  renderStats(getFiltered());
  const host = document.getElementById("tableHost");
  if(!rows.length){
    host.innerHTML = `<div class="empty">No submissions match the current filters yet.</div>`;
    return;
  }
  const arrow = (key) => sortKey===key ? (sortDir===1?" ▲":" ▼") : "";
  const head = `<tr>
      <th data-k="name">Name${arrow("name")}</th>
      <th data-k="class">Class${arrow("class")}</th>
      <th data-k="student_no">No.${arrow("student_no")}</th>
      <th data-k="set_title">Set${arrow("set_title")}</th>
      <th data-k="percent">Score${arrow("percent")}</th>
      <th data-k="time_used_sec">Time${arrow("time_used_sec")}</th>
      <th data-k="submitted_at">Submitted${arrow("submitted_at")}</th>
    </tr>`;
  const body = rows.map(r=>{
    const open = openKeys.has(r._key);
    const main = `<tr class="toggle-row${open?" open":""}" data-key="${esc(r._key)}">
        <td>${esc(r.name)}</td>
        <td>${esc(r.class)}</td>
        <td>${esc(r.student_no)}</td>
        <td>${esc(r.set_title)}</td>
        <td class="pct-cell ${pctClass(r.percent||0)}">${r.score}/${r.total} (${r.percent}%)</td>
        <td>${mmss(r.time_used_sec)}</td>
        <td>${r.submitted_at ? new Date(r.submitted_at).toLocaleString() : "-"}</td>
      </tr>`;
    const detail = open ? `<tr class="detail-row" data-detailfor="${esc(r._key)}">
        <td colspan="7">
          <b>Section breakdown</b>
          ${partGridHtml(r.per_part)}
          <b style="display:block;margin-top:10px">Answers (1–4, _ = blank)</b>
          ${answersHtml(r.answers)}
        </td>
      </tr>` : "";
    return main + detail;
  }).join("");
  host.innerHTML = `<table class="results"><thead>${head}</thead><tbody>${body}</tbody></table>`;

  host.querySelectorAll("thead th").forEach(th=>{
    th.addEventListener("click", ()=>{
      const k = th.dataset.k;
      if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=1; }
      renderTable();
    });
  });
  host.querySelectorAll("tr.toggle-row").forEach(tr=>{
    tr.addEventListener("click", ()=>{
      const key = tr.dataset.key;
      if(openKeys.has(key)) openKeys.delete(key); else openKeys.add(key);
      renderTable();
    });
  });
}

function buildExportCSV(rows){
  const allPartKeys = [...new Set(rows.flatMap(r=>Object.keys(r.per_part||{})))];
  const head = ["name","class","student_no","set_title","score","total","percent","time_used","submitted_at",...allPartKeys];
  const escCsv = v=>{ v=String(v==null?"":v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  const lines = [head.join(",")];
  rows.forEach(r=>{
    const row = [r.name,r.class,r.student_no,r.set_title,r.score,r.total,r.percent,mmss(r.time_used_sec),
      r.submitted_at?new Date(r.submitted_at).toLocaleString():"",
      ...allPartKeys.map(k=>(r.per_part&&r.per_part[k])||"")];
    lines.push(row.map(escCsv).join(","));
  });
  return lines.join("\n");
}
document.getElementById("exportCsv").addEventListener("click", ()=>{
  const rows = sortRows(getFiltered());
  if(!rows.length){ alert("No rows to export."); return; }
  const text = buildExportCSV(rows);
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(text);
  a.download = `AFS_results_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
});

["filterSet","filterClass","filterName"].forEach(id=>{
  document.getElementById(id).addEventListener("input", renderTable);
  document.getElementById(id).addEventListener("change", renderTable);
});

window.__renderResults = function(rows){
  ALL_ROWS = rows;
  populateFilters(rows);
  renderTable();
};
window.__renderError = function(err){
  document.getElementById("tableHost").innerHTML = `<div class="err">Could not load results from Firebase: ${esc(err.message||err)}</div>`;
};
</script>
